<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Stocks</title>
</head>
<body style="background-color: #1a202c; color: white; padding: 50px; font-family: sans-serif;">

    <h2 style="color: #60a5fa;">Found {{ stock_names|length }} Unique Stocks in Your File</h2>

    <div style="background-color: #2d3748; padding: 20px; border-radius: 8px; max-width: 400px; margin-top: 20px;">
        <ul style="list-style-type: none; padding: 0; margin: 0;">
            {% for name in stock_names %}
                <li style="padding: 10px; border-bottom: 1px solid #4a5568;">
                    {{ forloop.counter }}. <strong>{{ name }}</strong>
                </li>
            {% empty %}
                <li style="padding: 10px; color: #f87171;">Koi stock nahi mila.</li>
            {% endfor %}
        </ul>
    </div>

    <br>
    <a href="/" style="color: #4ade80; text-decoration: none;">&larr; Upload Another File</a>

</body>
</html>
