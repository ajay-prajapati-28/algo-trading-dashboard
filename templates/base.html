<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algo Trading Platform</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <!-- Main Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'index' %}">🚀 Algo Dash</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'index' %}">Live Market</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'upload_excel' %}">Upload Stocks</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'select_stocks' %}">Select Stocks</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'backtest_dashboard' %}">Backtesting</a>
                    </li>
                </ul>

                <!-- 🔥 Broker Switcher Dropdown -->
                <div class="nav-item dropdown ms-3 me-3">
                    <button class="btn btn-outline-warning dropdown-toggle fw-bold" type="button" id="brokerDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        Broker: {{ request.session.active_broker|default:'groww'|title }}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="brokerDropdown">
                        <li>
                            <a class="dropdown-item fw-bold {% if request.session.active_broker != 'dhan' %}active bg-success{% endif %}" href="{% url 'set_broker' 'groww' %}">
                                🟢 Groww API
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item fw-bold {% if request.session.active_broker == 'dhan' %}active bg-success{% endif %}" href="{% url 'set_broker' 'dhan' %}">
                                🟣 Dhan API
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="container pb-5">

        <!-- Alerts & Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
                    <strong>Notice:</strong> {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <!-- Page Specific Content -->
        {% block content %}
        {% endblock content %}

    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
